stages:
  - linting
  - tests

cache:
  key:
    files:
      - pyproject.toml
      - .pre-commit-config.yaml
  paths:
    - .cache/uv
    - .cache/pre-commit

variables:
  UV_CACHE_DIR: ".cache/uv"
  PRE_COMMIT_HOME: ".cache/pre-commit"

.env_setup: &env_setup
  before_script:
    # Install system dependencies
    - apt-get update && apt-get install -y --no-install-recommends libgdal-dev g++ libgl1 libglib2.0-0 libsm6 libxext6 libxrender1 rsync openssh-client git

    # Configure git
    - git config --global --add safe.directory "*"
    
    # Configure GDAL environment
    - export GDAL_VERSION=$(gdal-config --version)
    - export CPLUS_INCLUDE_PATH=/usr/include/gdal
    - export C_INCLUDE_PATH=/usr/include/gdal
    
    # Sync dependencies
    - uv add "gdal==${GDAL_VERSION}.*"
    - uv sync --all-extras --dev

pre-commit:
  stage: linting
  tags:
    - docker
  image:
    name: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    pull_policy: [if-not-present, always]
  <<: *env_setup
  script:
    - uv run pre-commit run --all-files --color always --show-diff-on-failure

test-module:
  stage: tests
  tags:
    - docker
  image:
    name: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    pull_policy: [if-not-present, always]
  <<: *env_setup
  script:
    - uv run -m unittest discover -v -s . -p "test_*.py"
